version: '3.8'

services:
  bot:
    build: .
    container_name: obwepit_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  web:
    build: .
    container_name: obwepit_web
    restart: always
    command: uvicorn web:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /opt/telegram-moderation-bot/data:/opt/telegram-moderation-bot/data

  feedback:
    build: .
    container_name: obwepit_feedback
    restart: always
    command: python feedback_bot.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data

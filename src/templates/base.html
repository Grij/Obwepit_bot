<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общепіт | {% block title %}Дашборд{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    {% block head_scripts %}{% endblock %}
    <style>
        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            row-gap: 0.4rem;
        }

        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent-color);
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .app-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            /* Приблизно 3-5 см залежно від екрану */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
            font-size: 0.85rem;
        }

        .dashboard-container {
            padding-bottom: 140px;
        }

        @media (max-width: 768px) {
            .top-bar {
                gap: 0.75rem;
                align-items: flex-start;
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>

<body>
    <div class="dashboard-container">
        <header>
            <div class="top-bar">
                <h1 style="display: flex; align-items: center; gap: 0.5rem;"><span
                        style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80;"></span>Общепіт
                </h1>
                <nav class="nav-links">
                    <a href="/" {% if active_page=='dashboard' %}class="active" {% endif %}>Дашборд</a>
                    <a href="/users" {% if active_page=='users' %}class="active" {% endif %}>Користувачі</a>
                    <a href="/feedback" {% if active_page=='feedback' %}class="active" {% endif %}>Альварес</a>
                    <a href="/posting" {% if active_page=='posting' %}class="active" {% endif %}>Постінг</a>
                    <a href="/moderator" {% if active_page=='moderator' %}class="active" {% endif %}>Модератор</a>
                </nav>
            </div>
        </header>

        {% block content %}{% endblock %}
    </div>

    <footer class="app-footer">
        <div style="display: flex; gap: 1rem; align-items: center; justify-content: center; margin-bottom: 0.5rem;">
            <span style="color: #94a3b8;">{{ user_name or user_email }}</span>
            <a href="/logout"
                style="color: #fca5a5; text-decoration: none; font-weight: 500; padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2);">Вийти</a>
        </div>

        <div
            style="display: flex; flex-direction: column; align-items: center; gap: 0.25rem; font-size: 0.75rem; color: #475569;">
            <span>v{{ app_version }}</span>
            <span>Останнє оновлення: {{ app_last_update }}</span>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>

</html>
